    </radialGradient>
  </defs>

  <rect x="6" y="10" width="44" height="44" rx="10" fill="url(#soc-card)" />
  <rect x="6" y="10" width="44" height="44" rx="10" fill="url(#soc-card-edge)" />

  <rect x="14" y="20" width="22" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.42" />
  <rect x="14" y="28" width="28" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.92" />
  <rect x="14" y="36" width="16" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.38" />
  <rect x="14" y="44" width="24" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.7" />

  <circle cx="52" cy="14" r="14" fill="url(#soc-spark-glow)" />
  <circle cx="52" cy="14" r="6" fill="url(#soc-spark)" />
  <circle cx="52" cy="14" r="2" fill="#ffffff" />
