<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SOC Agent">
  <title>SOC Agent</title>
  <defs>
    <linearGradient id="soc-card" x1="6" y1="10" x2="50" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9F1239" />
      <stop offset="55%" stop-color="#E11D48" />
      <stop offset="100%" stop-color="#FB7185" />
    </linearGradient>
    <linearGradient id="soc-card-edge" x1="6" y1="10" x2="6" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="soc-spark" x1="46" y1="8" x2="58" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FEF3C7" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <radialGradient id="soc-spark-glow" cx="52" cy="14" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.6" />
