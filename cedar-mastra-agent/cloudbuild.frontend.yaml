substitutions:
  _REGION: us-east4
  _SERVICE_NAME: rutgers-soc-agent
  _SERVICE_ACCOUNT: firebase-app-hosting-compute@concise-foundry-465822-d7.iam.gserviceaccount.com
  _IMAGE_NAME: rutgers-soc-agent
  _NEXT_PUBLIC_MASTRA_URL: https://rutgers-agent-mastra-backend-496012954691.us-east4.run.app
  _NEXT_PUBLIC_SUPABASE_URL: https://cokisotftjntuswdfuhc.supabase.co
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNva2lzb3RmdGpudHVzd2RmdWhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgwMjY4OTQsImV4cCI6MjA4MzYwMjg5NH0.BU9D9cMt_j2Gd5HYf8Xccd02cq5SGSJk-EBVJZIyBCU"

steps:
  - name: gcr.io/cloud-builders/docker
    dir: cedar-mastra-agent
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/firebaseapphosting-images/${_IMAGE_NAME}:$COMMIT_SHA
      - -f
      - Dockerfile
      - --build-arg
      - NEXT_PUBLIC_MASTRA_URL=${_NEXT_PUBLIC_MASTRA_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}
      - --build-arg
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/firebaseapphosting-images/${_IMAGE_NAME}:$COMMIT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/firebaseapphosting-images/${_IMAGE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --service-account
      - ${_SERVICE_ACCOUNT}
      - --no-invoker-iam-check
      - --set-env-vars
      - NEXT_PUBLIC_MASTRA_URL=${_NEXT_PUBLIC_MASTRA_URL},NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL},NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/firebaseapphosting-images/${_IMAGE_NAME}:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
